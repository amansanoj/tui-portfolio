# fly.toml app configuration file generated for tui-portfolio-ahgpsa on 2026-03-23T14:49:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tui-portfolio-ahgpsa'
primary_region = 'bom'

[build]

[[mounts]]
  source = 'portfolio_data'
  destination = '/data'

[[services]]
  protocol = 'tcp'
  internal_port = 2222
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 22

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
